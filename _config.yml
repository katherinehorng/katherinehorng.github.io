title: Katherine Horng
description: A portfolio of projects I have worked on
url: "https://katherinehorng.github.io/"         # your site URL when live, leave empty for local dev
baseurl: ""     # usually leave empty for GitHub Pages

# Theme
remote_theme: mmistakes/minimal-mistakes

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Top navigation menu
navigation:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Projects
    url: /projects/

# Optional: hide sidebar site-wide (so only top navigation shows)
sidebar:
  hide: true

# Defaults for pages
defaults:
  - scope:
      path: ""       # all pages
      type: "pages"
    values:
      layout: "single"
      author_profile: true

# Optional: home page settings
defaults:
  - scope:
      path: ""       # home page only
      type: "home"
    values:
      layout: "home"

# Optional: include files in build
include:
  - _pages       # if you have a _pages folder for pages

# Optional: exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle

# Build settings
markdown: kramdown
highlighter: rouge